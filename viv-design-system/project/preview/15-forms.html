<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px;background:#fff;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.f{display:flex;flex-direction:column;gap:6px;}
.lbl{font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--fg-3);}
.in{font-family:var(--font-sans);font-size:15px;padding:12px 14px;border-radius:12px;border:1px solid var(--border-1);background:#fff;outline:none;transition:border .18s;}
.in:focus{border-color:var(--ink);box-shadow:0 0 0 4px rgba(193,249,3,0.3);}
.in.filled{border-color:var(--ink);}
.select{background-image:linear-gradient(45deg,transparent 50%,var(--ink) 50%),linear-gradient(135deg,var(--ink) 50%,transparent 50%);background-position:calc(100% - 18px) 50%,calc(100% - 13px) 50%;background-size:5px 5px,5px 5px;background-repeat:no-repeat;appearance:none;padding-right:34px;}
</style></head><body>
<div class="f"><div class="lbl">Nom</div><input class="in" placeholder="Votre nom"></div>
<div class="f"><div class="lbl">Email</div><input class="in filled" value="contact@viv-prod.com"></div>
<div class="f"><div class="lbl">Secteur</div><select class="in select"><option>Transport</option><option>Luxe</option></select></div>
<div class="f"><div class="lbl">Message</div><input class="in" placeholder="Parlez-nous de votre projet"></div>
</body></html>
