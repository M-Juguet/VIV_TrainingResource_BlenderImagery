<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:26px 26px;background:var(--bg-2);}
.row{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.card{background:#fff;border-radius:14px;height:90px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
.s-sm{box-shadow:0 1px 2px rgba(10,10,10,0.04),0 1px 1px rgba(10,10,10,0.03);}
.s-md{box-shadow:0 4px 12px rgba(10,10,10,0.06),0 2px 4px rgba(10,10,10,0.04);}
.s-lg{box-shadow:0 16px 40px rgba(10,10,10,0.08),0 4px 8px rgba(10,10,10,0.04);}
</style></head><body>
<div class="row">
  <div class="card s-sm">shadow-sm</div>
  <div class="card s-md">shadow-md</div>
  <div class="card s-lg">shadow-lg</div>
</div>
</body></html>
