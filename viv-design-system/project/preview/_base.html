<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-1);font-family:var(--font-sans);color:var(--fg-1);}
  .card{padding:20px 24px;min-height:110px;display:flex;flex-direction:column;gap:14px;}
  .row{display:flex;gap:10px;align-items:stretch;}
  .label{font-size:11px;font-weight:500;color:var(--fg-3);letter-spacing:.04em;}
  .mono{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
  .swatch{flex:1;border-radius:10px;min-height:72px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;border:1px solid var(--border-2);}
  .swatch .name{font-size:12px;font-weight:600;}
  .swatch .hex{font-family:var(--font-mono);font-size:10px;opacity:.7;margin-top:2px;}
</style></head><body></body></html>
