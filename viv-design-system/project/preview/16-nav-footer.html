<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:0;background:#fff;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;border-bottom:1px solid var(--border-2);}
.nav img{height:34px;}
.links{display:flex;gap:26px;}
.links a{font-family:var(--font-sans);font-size:14px;color:var(--ink);text-decoration:none;font-weight:500;}
.links a:hover{color:var(--viv-green-600);}
.cta{background:var(--viv-green);color:var(--ink);padding:9px 18px;border-radius:10px;font-weight:500;font-size:14px;text-decoration:none;}
.footer{background:var(--ink);color:#fff;padding:22px 28px;display:flex;justify-content:space-between;align-items:center;}
.footer img{height:28px;}
.footer-links{display:flex;gap:18px;}
.footer-links a{color:rgba(255,255,255,.7);font-size:12px;text-decoration:none;}
</style></head><body>
<div class="nav">
  <img src="../assets/logos/viv-horizontal-black.png" alt="VIV">
  <div class="links">
    <a href="#">Nos talents</a>
    <a href="#">Nos secteurs</a>
    <a href="#">Nos engagements</a>
    <a href="#">Écosystème</a>
  </div>
  <a class="cta" href="#">Contact</a>
</div>
<div class="footer">
  <img src="../assets/logos/viv-horizontal-white.png" alt="VIV">
  <div class="footer-links">
    <a>Mentions légales</a><a>Cookies</a><a>LinkedIn</a><a>Instagram</a>
  </div>
</div>
</body></html>
