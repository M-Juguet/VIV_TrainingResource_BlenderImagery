<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:#fff;display:flex;flex-wrap:wrap;gap:10px;}
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;font-size:13px;font-weight:500;border-radius:999px;border:1px solid var(--border-1);background:#fff;}
.green{background:var(--viv-green);border-color:var(--viv-green);}
.dark{background:var(--ink);color:#fff;border-color:var(--ink);}
.soft{background:var(--bg-2);border-color:transparent;}
.dot{width:6px;height:6px;border-radius:999px;background:currentColor;}
</style></head><body>
<span class="chip green">CDD</span>
<span class="chip green">CDI</span>
<span class="chip">Portage salarial</span>
<span class="chip">Freelance</span>
<span class="chip">Intermittent</span>
<span class="chip dark"><span class="dot" style="color:var(--viv-green);"></span>ISO 9001</span>
<span class="chip soft">EcoVadis · Or</span>
<span class="chip soft">Qualiopi</span>
</body></html>
