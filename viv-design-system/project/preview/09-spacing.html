<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px 24px;background:#fff;}
.row{display:flex;align-items:flex-end;gap:14px;}
.box{background:var(--viv-green);border-radius:4px;}
.b1{width:4px;height:22px;} .b2{width:8px;height:32px;} .b3{width:12px;height:42px;}
.b4{width:16px;height:52px;} .b5{width:24px;height:66px;} .b6{width:32px;height:82px;}
.b7{width:48px;height:100px;} .b8{width:64px;height:118px;}
.item{text-align:center;}
.lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:6px;}
</style></head><body>
<div class="row">
  <div class="item"><div class="box b1"></div><div class="lbl">4</div></div>
  <div class="item"><div class="box b2"></div><div class="lbl">8</div></div>
  <div class="item"><div class="box b3"></div><div class="lbl">12</div></div>
  <div class="item"><div class="box b4"></div><div class="lbl">16</div></div>
  <div class="item"><div class="box b5"></div><div class="lbl">24</div></div>
  <div class="item"><div class="box b6"></div><div class="lbl">32</div></div>
  <div class="item"><div class="box b7"></div><div class="lbl">48</div></div>
  <div class="item"><div class="box b8"></div><div class="lbl">64</div></div>
</div>
<div style="font-size:11px;color:var(--fg-3);margin-top:14px;">--space-1 … --space-8 · 4/8/12/16/24/32/48/64 px — also 96, 128 for section padding</div>
</body></html>
