<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px 26px;background:#fff;}
.label{font-family:var(--font-sans);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--fg-3);margin-bottom:10px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.sw{
  border-radius:22px;
  height:240px;
  padding:22px;
  display:flex;flex-direction:column;justify-content:space-between;
  position:relative;
}
.sw--black{background:#000000;color:#fff;}
.sw--offwhite{background:#F9F9F9;color:#000;border:1px solid rgba(0,0,0,0.08);}
.name{
  font-family:var(--font-display);
  font-weight:700;font-style:italic;
  font-size:34px;line-height:1;
  letter-spacing:-0.01em;
}
.specs{display:flex;flex-direction:column;gap:6px;font-family:var(--font-sans);font-size:12px;font-weight:500;}
.spec-row{display:flex;align-items:baseline;gap:10px;}
.spec-key{font-weight:700;width:44px;}
.spec-val{font-family:ui-monospace,'SF Mono',monospace;font-size:11.5px;opacity:0.9;}
.source{font-family:var(--font-sans);font-size:11px;color:var(--fg-3);margin-top:14px;}
</style></head><body>
<div class="label">Couleurs primaires</div>
<div class="grid">
  <div class="sw sw--black">
    <div class="name">Black</div>
    <div class="specs">
      <div class="spec-row"><span class="spec-key">CMJN</span><span class="spec-val">0 · 0 · 0 · 100</span></div>
      <div class="spec-row"><span class="spec-key">RVB</span><span class="spec-val">0 · 0 · 0</span></div>
      <div class="spec-row"><span class="spec-key">HEXA</span><span class="spec-val">#000000</span></div>
    </div>
  </div>
  <div class="sw sw--offwhite">
    <div class="name">Off-white</div>
    <div class="specs">
      <div class="spec-row"><span class="spec-key">CMJN</span><span class="spec-val">0 · 0 · 0 · 2</span></div>
      <div class="spec-row"><span class="spec-key">RVB</span><span class="spec-val">249 · 249 · 249</span></div>
      <div class="spec-row"><span class="spec-key">HEXA</span><span class="spec-val">#F9F9F9</span></div>
    </div>
  </div>
</div>
<div class="source">Source : Charte graphique VIV 2025 — Couleurs primaires</div>
</body></html>
